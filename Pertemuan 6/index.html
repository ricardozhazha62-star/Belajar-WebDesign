<html lang="en">
<head>

<body>
    <h1>Cek umur</h1>
        <label for="umur" >masukan umur:</label>

        <p id="hasilumur"></p>

        <br>
        <H2>Login page</H2>

        <br>
        <br>
        <Label for="password">Password</Label>
        <input type="password" id="password" placeholder="masukan pw">
        <br>
        <button onclick="login()">Masuk</button>
        <p id="hasillogin"></p>
        <br>
        <br>
        <h3>Diskon</h3>

            <label> <input type="checkbox" id = "isMember">Apakah anda membership</label>
            <br>
            <label> <input type="checkbox" id = "kantong">Apakah anda membawa kantong</label>
            <br>
            <label for="totalbelanja">Total belanja (Rp):</label>
            <input type="number" id="totalbelanja" placeholder="Masukan total belanja" />
            <button type="button" onclick="cekDiskon()">Cek diskon</button>
        </form>
        <p id="hasilDiskon"></p>
        <br>
        <br>
        <h4>Cek Nilai Anda</h4>

        <button onclick="ceknilai()">Cek</button>
        <p id="CekNilai"></p>
