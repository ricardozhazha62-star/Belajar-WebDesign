<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Yayaya</title>
</head>
<style>
        body{
                font-family: Arial, Helvetica, sans-serif;
                text-align: center;
                padding: 40px;
                background: white;}
            
        h1 {
                margin-bottom: 30px;
            }
        .box {
            width: 100px;
            height: 100px;
            background-color: steelblue;
            margin: 40px auto;
            border-radius: 12px;

            animation-name: TahanSabar;
            animation-duration: 3s;
            animation-iteration-count: 4;
            animation-direction: alternate;
            animation-fill-mode: forwards;
        }
        
        @keyframes TahanSabar {
            0%{
                transform: translateX(0) scale(1);
                background-color: darkblue;
            }
            25% {
                transform: translateY(50px)scale(1.3);
                background-image: url(/Images/sddefault.jpg);
                background-size: cover;
                background-color: firebrick;
                width: 150px;}
            50% {
                transform: translate(100px, 100px);
            }
            100% {
                transform: translateX(0);
            }
        }

</style>
<body>
    <h1>Contoh Gabungan Animasi</h1>
    <div class="box">TahanSabar</div>
    <p>Animasi ini berjalan selama 3 detik <b>3 detik</b>, diulang <b>4 kali</b> , arah <b>bolak balik</b>
    (alternate) dan setelah selesai akan <B>tetap di posisi akhir</B></p>
</body>
</html>
