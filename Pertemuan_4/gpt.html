<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yayaya</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    padding: 40px;
    background: white;
}

h1 {
    margin-bottom: 30px;
}

.box {
    width: 100px;
    height: 100px;
    background-color: steelblue;
    margin: 40px auto;
    border-radius: 12px;

    animation-name: movebox;
    animation-duration: 3s;
    animation-iteration-count: 4;
    animation-direction: alternate;
    animation-fill-mode: forwards;
}

@keyframes movebox {
    0%{
        transform: translate(0,0) scale(1);
        background-color: darkblue;
    }
    25% {
        transform: translate(0,50px) scale(1.3);
        background-color: firebrick;
        width: 150px;
    }
    50% {
        transform: translate(100px,100px);
    }
    100% {
        transform: translate(0,0);
    }
}
</style>
</head>

<body>
    <h1>Contoh Gabungan Animasi</h1>
    <div class="box">Tahan Sabar</div>
    <p>Animasi ini berjalan selama <b>3 detik</b>, diulang <b>4 kali</b>, 
    arah <b>bolak balik</b> (alternate) dan setelah selesai akan 
    <b>tetap di posisi akhir</b></p>
</body>
</html>
