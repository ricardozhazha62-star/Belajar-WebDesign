<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>variasi Property Transition </title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            padding: 40px;
            background: white;
        }
        h1 {
            margin-bottom: 30px;
        }
        /* Card Container */
        .container {display: flex;
        justify-content: center;
         gap: 25px;
         flex-wrap: wrap;
        }
        .card {
            width: 200px;
            height: 150px;
            background: cornflowerblue;
            color: antiquewhite;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            cursor: pointer;
        }
        /* Transisi Bg Color */
        .bg {
            transition: background-color 0.6s ease;
        }
        .bg:hover{
            background-color: darkgoldenrod;
        }
        /* Transform */
        .transform {
            transition: transform 0.7s ease-in-out;
        }
        .transform:hover {
            transform: scale(1.5) rotate(90deg);
        }
        /* Transisi Radius */
        .radius {
            transition: border-radius 0.5s ease-in-out;
        }
        .radius:hover {
            border-radius: 60%;
            background-color: darksalmon;
        }
        /* Box Shadow */
        .shadow {
            transition: box-shadow 0.6s ease-in;
        }
        .shadow:hover {
            box-shadow: 0 15px 20px color(0,0,0,0.4);
        }
        /* Multi Transisi */
        .multi {
            transition: 
            background-color 0.5s
            transform 0.5s
            border-radius 0.5;
        }
        .multi:hover {
            background-color: lavenderblush;
            transform: translateY(-10Px)scale(1.3);
            border-radius : 30px ;
        }        

    </style>
</head>
<body>
    <H1>Variasi Properti Transisi</H1>

    <Div class="container">
        <div class="card bg">BG</div>
        <div class="card transform">Transform</div>
        <div class="card radius">Amba</div>
        <div class="card shadow">Raffi Amba</div>
        <div class="card multi">Oposeh fi</div>

    </Div>
</body>
</html>
